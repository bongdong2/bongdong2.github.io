<footer class="footer">
  <div>© {{ 'now' | date: "%Y" }} 봉동이. Built with care, deployed on github.io.</div>
  <div class="footer__links">
    <a href="{{ "/feed.xml" | absolute_url }}">RSS</a>
    {% for follow in site.footer.follow %}
      {% if follow.name != 'RSS' %}
        <a href="{{ follow.link }}">{{ follow.name }}</a>
      {% endif %}
    {% endfor %}
    {% for contact in site.footer.contact %}
      {% if contact.name == 'Email' %}
        <a href="{{ contact.link }}">Email</a>
      {% endif %}
    {% endfor %}
  </div>
</footer>
